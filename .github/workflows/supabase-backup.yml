name: Supabase DB Backup

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secret
        run: |
          if [ -z "${SUPABASE_DB_URL}" ]; then
            echo "Missing SUPABASE_DB_URL secret"
            exit 1
          fi

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create database dumps
        run: |
          set -euo pipefail
          TS="$(date -u +%Y-%m-%dT%H-%M-%SZ)"
          mkdir -p backups

          pg_dump "${SUPABASE_DB_URL}" \
            --format=custom \
            --no-owner \
            --no-privileges \
            --file="backups/supabase-${TS}.dump"

          pg_dump "${SUPABASE_DB_URL}" \
            --format=plain \
            --no-owner \
            --no-privileges \
            --file="backups/supabase-${TS}.sql"

          gzip -9 "backups/supabase-${TS}.sql"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backups/*
          if-no-files-found: error
          retention-days: 30

