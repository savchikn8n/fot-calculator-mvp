name: Supabase DB Backup

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      BACKUP_REPO: ${{ secrets.BACKUP_REPO }}
      BACKUP_REPO_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
      BACKUP_REPO_BRANCH: ${{ secrets.BACKUP_REPO_BRANCH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secret
        run: |
          if [ -z "${SUPABASE_DB_URL}" ]; then
            echo "Missing SUPABASE_DB_URL secret"
            exit 1
          fi

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | \
            sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | \
            sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Create database dumps
        run: |
          set -euo pipefail
          TS="$(date -u +%Y-%m-%dT%H-%M-%SZ)"
          mkdir -p backups
          PG_DUMP_BIN="/usr/lib/postgresql/17/bin/pg_dump"
          "${PG_DUMP_BIN}" --version

          "${PG_DUMP_BIN}" "${SUPABASE_DB_URL}" \
            --format=custom \
            --no-owner \
            --no-privileges \
            --file="backups/supabase-${TS}.dump"

          "${PG_DUMP_BIN}" "${SUPABASE_DB_URL}" \
            --format=plain \
            --no-owner \
            --no-privileges \
            --file="backups/supabase-${TS}.sql"

          gzip -9 "backups/supabase-${TS}.sql"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backups/*
          if-no-files-found: error
          retention-days: 30

      - name: Mirror backup to private repository
        if: ${{ env.BACKUP_REPO != '' && env.BACKUP_REPO_TOKEN != '' }}
        run: |
          set -euo pipefail
          REPO_BRANCH="${BACKUP_REPO_BRANCH:-main}"
          TARGET_DIR="$(mktemp -d)"
          git clone --depth=1 --branch "${REPO_BRANCH}" "https://x-access-token:${BACKUP_REPO_TOKEN}@github.com/${BACKUP_REPO}.git" "${TARGET_DIR}"

          mkdir -p "${TARGET_DIR}/supabase/${GITHUB_REPOSITORY}"
          cp backups/* "${TARGET_DIR}/supabase/${GITHUB_REPOSITORY}/"

          cd "${TARGET_DIR}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git add supabase/"${GITHUB_REPOSITORY}"/*
          if git diff --staged --quiet; then
            echo "No staged changes"
            exit 0
          fi

          git commit -m "backup: ${GITHUB_REPOSITORY} run ${GITHUB_RUN_ID}"
          git push origin "${REPO_BRANCH}"
